<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo Card • Stage 1a</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card" class="todo-card">

        <!-- ==================== VIEW MODE ==================== -->
        <div id="view-mode">

            <!-- Header: Priority Indicator + Due Date -->
            <div class="header">
                <div class="priority-group">
                    <span data-testid="test-todo-priority-indicator" class="priority-indicator"></span>
                    <span data-testid="test-todo-priority" class="priority-badge">High</span>
                </div>
                <time id="test-todo-due-date" data-testid="test-todo-due-date" class="due-date"></time>
            </div>

            <!-- Title -->
            <h2 id="test-todo-title" data-testid="test-todo-title" class="title"></h2>

            <!-- Collapsible Description -->
            <div class="description-wrapper">
                <div id="test-todo-collapsible-section" data-testid="test-todo-collapsible-section" class="description">
                    <p id="test-todo-description" data-testid="test-todo-description"></p>
                </div>
                <button id="test-todo-expand-toggle" 
                        data-testid="test-todo-expand-toggle" 
                        class="expand-toggle"
                        aria-expanded="false">
                    Show more
                </button>
            </div>

            <!-- Status + Time Remaining -->
            <div class="status-time-row">
                <span id="test-todo-status" data-testid="test-todo-status" class="status-badge"></span>
                <span id="test-todo-time-remaining" data-testid="test-todo-time-remaining" class="time-remaining"></span>
                <span id="test-todo-overdue-indicator" data-testid="test-todo-overdue-indicator" class="overdue-indicator"></span>
            </div>

            <!-- Checkbox -->
            <div class="checkbox-container">
                <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
                <label for="complete-toggle" class="checkbox-label">Mark as complete</label>
            </div>

            <!-- Status Control -->
            <div class="status-control-container">
                <label for="status-control">Status:</label>
                <select id="test-todo-status-control" data-testid="test-todo-status-control">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </div>

            <!-- Tags -->
            <ul data-testid="test-todo-tags" class="tags-container" role="list">
                <!-- Tags will be added by JS if needed -->
            </ul>

            <!-- Action Buttons -->
            <div class="buttons-container">
                <button data-testid="test-todo-edit-button" class="btn edit-btn">✏️ Edit</button>
                <button data-testid="test-todo-delete-button" class="btn delete-btn">🗑️ Delete</button>
            </div>
        </div>

        <!-- ==================== EDIT MODE ==================== -->
        <div id="edit-mode" class="edit-mode" style="display: none;">

            <form id="test-todo-edit-form" data-testid="test-todo-edit-form">

                <label for="test-todo-edit-title-input">Title</label>
                <input type="text" 
                       id="test-todo-edit-title-input" 
                       data-testid="test-todo-edit-title-input">

                <label for="test-todo-edit-description-input">Description</label>
                <textarea id="test-todo-edit-description-input" 
                          data-testid="test-todo-edit-description-input"></textarea>

                <label for="test-todo-edit-priority-select">Priority</label>
                <select id="test-todo-edit-priority-select" 
                        data-testid="test-todo-edit-priority-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <label for="test-todo-edit-due-date-input">Due Date</label>
                <input type="date" 
                       id="test-todo-edit-due-date-input" 
                       data-testid="test-todo-edit-due-date-input">

                <div class="edit-buttons">
                    <button type="button" 
                            id="test-todo-save-button" 
                            data-testid="test-todo-save-button"
                            class="btn save-btn">Save</button>
                    
                    <button type="button" 
                            id="test-todo-cancel-button" 
                            data-testid="test-todo-cancel-button"
                            class="btn cancel-btn">Cancel</button>
                </div>
            </form>
        </div>

    </article>

    <script src="script.js"></script>
</body>
</html>
